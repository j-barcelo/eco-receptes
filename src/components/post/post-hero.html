<header class="post-hero">
    <img class="post-hero__image" src="{{ img }}" alt="{{ alt }}">
    <div class="post-hero__content">
        <div class="post-hero__badge">De temporada</div>
        <h1 class="post-hero__title">{{ title }}</h1>
        <div class="post-hero__meta">
            <span><i class="fa-solid fa-clock"></i> {{ time }}</span>
            <span><i class="fa-solid fa-utensils"></i> {{ people }}</span>
            <span><i class="fa-solid fa-chart-simple"></i> {{ difficulty }}</span>
        </div>
    </div>
</header>
